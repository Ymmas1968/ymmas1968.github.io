<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sammy Verdam | Home</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* Animated Retro Grid Background */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(0,255,136,0.08) 0%, transparent 60%),
        linear-gradient(rgba(0,255,136,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.05) 1px, transparent 1px);
      background-size:
        100% 100%,
        40px 40px,
        40px 40px;
      animation: gridMove 20s linear infinite, glowPulse 6s ease-in-out infinite;
    }

    /* Moving Grid Animation */
    @keyframes gridMove {
      0% {
        background-position:
          center,
          0 0,
          0 0;
      }
      100% {
        background-position:
          center,
          0 40px,
          40px 0;
      }
    }

    /* Subtle Neon Pulse */
    @keyframes glowPulse {
      0%, 100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.25);
      }
    }

    /* CRT overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 1px,
        rgba(0,0,0,0.1) 2px
      );
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: overlay;
      animation: flicker 0.1s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.98; }
      50% { opacity: 0.6; }
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      position: relative;
    }

    .name {
      font-size: 6rem;
      font-weight: bold;
      letter-spacing: 4px;
      margin: 0;
    }

    .title {
      font-size: 2rem;
      opacity: 0.8;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    .enter-btn {
      width: fit-content;
      padding: 14px 28px;
      font-size: 1rem;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s ease;
      text-decoration: none;
    }

    .enter-btn:hover {
      background: white;
      color: black;
    }

   .project-preview {
  position: absolute;
  bottom: 80px;
  left: 60px;
  right: 60px;
  display: flex;
  gap: 20px;
}

.project-card {
  flex: 1;
  position: relative;
  overflow: hidden;
  border: 1px solid #333;
  text-decoration: none;
  color: white;
  height: 220px;
  transition: 0.3s ease;
}

.project-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s ease;
}

.project-card:hover {
  border-color: white;
  transform: translateY(-6px);
}

.project-card:hover img {
  transform: scale(1.05);
}

.project-info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
}

.project-info h3 {
  margin: 0;
  font-size: 1.4rem;
}

.project-info p {
  margin: 5px 0 0;
  opacity: 0.8;
}
  </style>
</head>
<body>

  <section class="hero">
    <h1 class="name glitch" data-text="SAMMY VERDAM">
      SAMMY VERDAM
    </h1>

    <p class="title">
      Software Developer • Unity Developer • Game Designer
    </p>

    <a href="portfolio.html" class="enter-btn" onclick="enterSite(); return false;">
    ENTER SITE
  </a>

  <script>
  function enterSite() {
    sessionStorage.setItem('enteredFromIndex', 'true');
    window.location.href = 'portfolio.html';
  }
  
  function navigateToProject(url) {
    sessionStorage.setItem('returnTo', 'index');
    window.location.href = url;
  }
  </script>

    <div class="project-preview">
  <a href="#" class="project-card" onclick="navigateToProject('reclean.html'); return false;">
    <img src="493916714-f3808f2c-7415-40c7-8129-4f6713dbb4a7.gif" alt="RE-CLEAN">
    <div class="project-info">
      <h3>RE-CLEAN</h3>
      <strong>co-op survival horror</strong> 
    </div>
  </a>

  <a href="#" class="project-card" onclick="navigateToProject('hell-and-strife.html'); return false;">
    <img src="Schermafbeelding 2026-03-04 111656.png" alt="Hell and Strife">
    <div class="project-info">
      <h3>HELL AND STRIFE</h3>
      <strong>FPS • Norse mythology</strong>  
    </div>
  </a>
</div>
    </div>
  </section>

</body>
</html>
